<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹툰 뷰어</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Gothic+A1:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #e8c96e;
      --accent2: #c4563a;
      --text: #f0ece4;
      --text-muted: #7a7570;
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Gothic A1', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── TITLE SCREEN ── */
    #title-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 20px;
    }

    #title-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(232,201,110,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(196,86,58,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .title-deco {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(10px, 2vw, 13px);
      letter-spacing: 0.4em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .title-main {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(36px, 8vw, 80px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }

    .title-sub {
      font-size: clamp(13px, 2.5vw, 16px);
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.8s 0.6s forwards;
    }

    /* Cover image preview */
    .cover-wrap {
      width: min(340px, 80vw);
      aspect-ratio: 9/13;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.9s 0.7s forwards;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(232,201,110,0.1);
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent);
      color: #0d0d0d;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 2px;
    }

    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Gothic A1', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 16px 40px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s 1s forwards;
    }

    .start-btn:hover {
      background: #f5d97a;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,201,110,0.25);
    }

    .start-btn svg { width: 18px; height: 18px; }

    /* ── READER ── */
    #reader {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
    }

    /* Top bar */
    .reader-bar {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .bar-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .bar-page {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .bar-home {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Gothic A1', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .bar-home:hover { border-color: var(--accent); color: var(--accent); }

    /* Page canvas */
    .page-canvas {
      width: min(720px, 100vw);
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0;
    }

    .page-img-wrap {
      width: 100%;
      position: relative;
    }

    .page-img-wrap img {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .page-img-wrap img.loaded { opacity: 1; }

    .img-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      min-height: 400px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Navigation */
    .nav-row {
      width: min(720px, 100vw);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 48px;
      gap: 12px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Gothic A1', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      justify-content: center;
      max-width: 160px;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,201,110,0.05);
    }

    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Page dots */
    .page-dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      flex: 1;
      padding: 0 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .dot.active { background: var(--accent); transform: scale(1.3); }
    .dot.visited { background: var(--text-muted); }
    .dot:hover { background: var(--accent); }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* End screen */
    .end-card {
      text-align: center;
      padding: 60px 24px;
    }

    .end-card h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .end-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Keyboard hint */
    .key-hint {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      padding: 8px 0 0;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<!-- ─── TITLE SCREEN ─── -->
<div id="title-screen">
  <p class="title-deco">Webtoon · 2024</p>
  <h1 class="title-main">여덟 계단</h1>
  <p class="title-sub">제1편 : 23 scenes </p>

  <div class="cover-wrap">
    <!-- 첫 번째 이미지가 표지로 사용됩니다 -->
    <img id="cover" src="cover.jpg" alt="표지" />
    <span class="cover-badge">23 씬</span>
  </div>

  <button class="start-btn" onclick="startReading()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    1화부터 읽기
  </button>
</div>

<!-- ─── READER ─── -->
<div id="reader">
  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="reader-bar">
    <span class="bar-title" id="bar-title">웹툰 제목</span>
    <span class="bar-page" id="bar-page">1 / 23</span>
    <button class="bar-home" onclick="goHome()">목록</button>
  </div>

  <div class="page-canvas">
    <div class="page-img-wrap" id="img-wrap">
      <div class="img-loader" id="loader"><div class="spinner"></div></div>
      <img id="page-img" src="" alt="페이지" />
    </div>
    <p class="key-hint">← → 키보드 방향키로도 이동 가능</p>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="changePage(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      이전화
    </button>

    <div class="page-dots" id="dots"></div>

    <button class="nav-btn" id="btn-next" onclick="changePage(1)">
      다음화
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
</div>

<script>
  // ════════════════════════════════════════════════
  //  🔧 여기에 23장의 구글 드라이브 파일 ID를 입력하세요
  //  형식: 'https://drive.google.com/file/d/[FILE_ID]/view' 에서 FILE_ID 부분
  // ════════════════════════════════════════════════
  const FILE_IDS = [
    "1rjCWq9HHOgV8hFmbV3aPW5vHq1tZoH-R", // 1화
    "13-iYHpPy8vMhQqQXKCTQACWVZimSYkDN", // 2화
    "1t-fzOV4XwhCwoJKsK6_Tauig_q8F2Eh6", // 3화
    "1aaT_kWzpZaconPKKS1Dog62KdYT3Ub5f", // 4화
    "1SrK9bmZw2HKGRhlUu4_4Wwu2YyscKdCc", // 5화
    "1op2yymMP2nBDrJskzsilIgzNJwFEYOTy", // 6화
    "12QMGyrmc5jezcNjdYrNYq3CzOvS6Dhhr", // 7화
    "1UYIgh7B_Nnngdu6n_6BUoD46n4H6E2As", // 8화
    "17t21R4yN9ch0DpB6rhkoBCA3g1VoMgSj", // 9화
    "1kcBhfxKDL3kOopttYJQvgZv-pedzI1lP", // 10화
    "1a6a6LRIc-4zawGuQ3iwATK9hLhfsTpMn", // 11화
    "1c3Oi7jMe9W8Fls7U-oVHvZqAkfOvkbIK", // 12화
    "1H6HuhJ0pWf6MUT607yfkpFC5jGmvmlzo", // 13화
    "1QaTajc8y3gtjj96CMVjsLG71JV78Pb8g", // 14화
    "1AAm-f4KTFLfuTjFRebxsWiUJjQTTUy9Y", // 15화
    "1KsiGMoQH9C0xgkD-LhlkDOr3Wx3EWEp3", // 16화
    "1VOK0rCoC9Gb_293l8_htkwUja4dxSmhP", // 17화
    "1KCop4Mmj_OHouh_MrPVP7d-aCDiH4ZvH", // 18화
    "1h71BS2oRC1nMkkDwMobuDfy19XkYupFm", // 19화
    "1x8sdJXsotEf8oIPykvvqmOdueYWEBA5P", // 20화
    "16QSMeBo2OLsP2HS1nUeP7HkWaKkCh4tV", // 21화
    "1_o9Yr3PIy9ptuyGQASFMaU2leM7MVAJy", // 22화
    "1TZoGiJ4NMkvSygpeGZ0LxsfCikS0yN0M", // 23화
  ];

  // 구글 드라이브 직접 표시 URL 변환
  function gdUrl(id) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
  }

  const TITLE = "여덟 계단"; // ← 실제 제목으로 바꾸세요
  const TOTAL = FILE_IDS.length;

  let current = 0;
  const visited = new Set();

  // 표지 세팅
  document.getElementById("cover-img").src = gdUrl(FILE_IDS[0]);
  document.querySelector(".title-main").textContent = TITLE;
  document.querySelector(".title-sub").textContent = `총 ${TOTAL}화 · 단편 시리즈`;

  function startReading() {
    document.getElementById("title-screen").style.display = "none";
    const reader = document.getElementById("reader");
    reader.style.display = "flex";
    buildDots();
    loadPage(0);
  }

  function goHome() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("title-screen").style.display = "flex";
  }

  function buildDots() {
    const container = document.getElementById("dots");
    container.innerHTML = "";
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement("div");
      d.className = "dot";
      d.title = `${i + 1}화`;
      d.onclick = () => loadPage(i);
      container.appendChild(d);
    }
  }

  function loadPage(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    current = idx;
    visited.add(idx);

    const img = document.getElementById("page-img");
    const loader = document.getElementById("loader");

    // Reset
    img.classList.remove("loaded");
    loader.style.display = "flex";

    img.onload = () => {
      loader.style.display = "none";
      img.classList.add("loaded");
    };
    img.onerror = () => {
      loader.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center">이미지를 불러올 수 없습니다<br><small>${idx + 1}화</small></p>`;
    };
    img.src = gdUrl(FILE_IDS[idx]);

    // UI 업데이트
    document.getElementById("bar-page").textContent = `${idx + 1} / ${TOTAL}`;
    document.getElementById("bar-title").textContent = TITLE;
    document.getElementById("btn-prev").disabled = idx === 0;
    document.getElementById("btn-next").disabled = idx === TOTAL - 1;
    document.getElementById("progress").style.width = `${((idx + 1) / TOTAL) * 100}%`;

    // Dots
    document.querySelectorAll(".dot").forEach((d, i) => {
      d.classList.toggle("active", i === idx);
      d.classList.toggle("visited", visited.has(i) && i !== idx);
    });

    // Scroll to top
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function changePage(dir) {
    loadPage(current + dir);
  }

  // Keyboard navigation
  document.addEventListener("keydown", e => {
    if (document.getElementById("reader").style.display === "none") return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") changePage(1);
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   changePage(-1);
  });

  // Swipe support (mobile)
  let touchStartX = 0;
  document.addEventListener("touchstart", e => { touchStartX = e.changedTouches[0].clientX; });
  document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) changePage(dx < 0 ? 1 : -1);
  });
</script>
</body>
</html>
